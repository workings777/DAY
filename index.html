<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날짜 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 40px;
      width: 400px;
    }
    h1 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .date-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.2s;
      background: #fff;
    }
    .date-inputs:focus-within {
      border-color: #4a6cf7;
    }
    .date-inputs input[type="number"] {
      border: none;
      outline: none;
      font-size: 15px;
      color: #222;
      padding: 0;
      -moz-appearance: textfield;
      appearance: textfield;
      text-align: center;
    }
    .date-inputs input[type="number"]::-webkit-inner-spin-button,
    .date-inputs input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }
    .date-inputs input#d-year { width: 52px; }
    .date-inputs input#d-month { width: 28px; }
    .date-inputs input#d-day { width: 28px; }
    .date-sep {
      color: #aaa;
      font-size: 15px;
      user-select: none;
    }
    .radio-group {
      display: flex;
      gap: 16px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
    }
    input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4a6cf7;
    }
    .result {
      margin-top: 28px;
      background: #f0f4ff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .result__label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .result__value {
      font-size: 26px;
      font-weight: 700;
      color: #4a6cf7;
      letter-spacing: 1px;
    }
    .result__empty {
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>날짜 계산기</h1>

    <div class="field">
      <label>생산 구분</label>
      <div class="radio-group">
        <label><input type="radio" name="type" value="vietnam" checked> 베트남 생산 (−1년)</label>
        <label><input type="radio" name="type" value="domestic"> 국내 생산 (−3개월)</label>
      </div>
    </div>

    <div class="field">
      <label>구매일자</label>
      <div class="date-inputs">
        <input type="number" id="d-year" placeholder="YYYY" maxlength="4" min="1900" max="2100">
        <span class="date-sep">.</span>
        <input type="number" id="d-month" placeholder="MM" maxlength="2" min="1" max="12">
        <span class="date-sep">.</span>
        <input type="number" id="d-day" placeholder="DD" maxlength="2" min="1" max="31">
      </div>
    </div>

    <div class="result" id="result">
      <div class="result__empty">구매일자를 입력하세요</div>
    </div>
  </div>

  <script>
    const yearEl  = document.getElementById('d-year');
    const monthEl = document.getElementById('d-month');
    const dayEl   = document.getElementById('d-day');

    yearEl.addEventListener('input', () => {
      if (yearEl.value.length >= 4) monthEl.focus();
      calc();
    });
    monthEl.addEventListener('input', () => {
      if (monthEl.value.length >= 2) dayEl.focus();
      calc();
    });
    dayEl.addEventListener('input', calc);

    document.querySelectorAll('input[name="type"]').forEach(r => r.addEventListener('change', calc));

    function calc() {
      const y = yearEl.value.trim();
      const m = monthEl.value.trim();
      const dy = dayEl.value.trim();
      const resultEl = document.getElementById('result');

      if (!y || !m || !dy || y.length < 4) {
        resultEl.innerHTML = '<div class="result__empty">구매일자를 입력하세요</div>';
        return;
      }

      const type = document.querySelector('input[name="type"]:checked').value;
      const d = new Date(Number(y), Number(m) - 1, Number(dy));

      if (isNaN(d.getTime())) {
        resultEl.innerHTML = '<div class="result__empty">올바른 날짜를 입력하세요</div>';
        return;
      }

      if (type === 'vietnam') {
        d.setFullYear(d.getFullYear() - 1);
      } else {
        d.setMonth(d.getMonth() - 3);
      }

      const formatted = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
      resultEl.innerHTML = `
        <div class="result__label">제조일자</div>
        <div class="result__value">${formatted}</div>
      `;
    }
  </script>
</body>
</html>
